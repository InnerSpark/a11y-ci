<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>a11y-ci demo: accessible page</title>
</head>
<body>
  <main>
    <h1>Newsletter signup</h1>
    <p style="color:#1a1a1a; background:#ffffff">Join our newsletter for product updates.</p>
    <img src="logo.png" alt="Acme Co. logo" width="80" height="80">
    <form>
      <label for="email">Email address</label>
      <input id="email" name="email" type="email">
      <button type="submit">Subscribe</button>
    </form>
  </main>
</body>
</html>
