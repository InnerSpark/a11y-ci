# Self-test: proves the whole pipeline runs in real CI and comments on a PR,
# with no external preview infrastructure. It serves two local demo pages
# (examples/demo/good.html and bad.html), audits both with the published CLI,
# diffs them, and posts the regression-only comment to the PR.
#
# good.html is clean; bad.html adds a few real WCAG issues, so the diff shows
# exactly what a PR "introduces".
name: a11y-ci self-test
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install a11y-ci CLI + browser
        run: |
          npm install -g @a11yci/cli@latest
          npx --yes playwright install --with-deps chromium

      - name: Serve the demo pages
        run: |
          python3 -m http.server 8080 --directory examples/demo &
          # wait for the server to accept connections
          for i in $(seq 1 20); do curl -sf http://localhost:8080/good.html >/dev/null && break || sleep 0.5; done

      - name: Audit good (base) and bad (head), then diff
        env:
          # Present only if the repo has the secret; same-repo PRs receive it.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          a11y-ci audit http://localhost:8080/good.html --out base.json
          a11y-ci audit http://localhost:8080/bad.html  --out head.json
          FLAGS=(--base base.json --head head.json --out comment.md)
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            FLAGS+=(--suggest-fixes)
            echo "ANTHROPIC_API_KEY present: AI fix suggestions ON"
          else
            echo "No ANTHROPIC_API_KEY: deterministic only"
          fi
          a11y-ci diff "${FLAGS[@]}" || true
          echo "----- comment.md -----"
          cat comment.md

      - name: Post the comment on the PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8') + '\n<!-- a11y-ci-selftest -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes('<!-- a11y-ci-selftest -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
